<!DOCTYPE html>
<html>
<head>
<title>Goat Farm VC Model</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; background:#f3f3f3; margin:20px; }
.container { background:white; padding:20px; border-radius:10px; max-width:1200px; }
.section { background:#eef; padding:12px; margin-top:15px; border-radius:8px; }
input { width:120px; padding:5px; margin:4px; }
label { display:inline-block; width:340px; }
.card { background:#f9f9f9; padding:15px; margin-top:20px; border-radius:8px; }
button { padding:10px 15px; cursor:pointer; }
select { padding:5px; }
</style>
</head>

<body>

<div class="container">

<h2>🐐 Goat Farm VC-Grade Investment Simulator</h2>

<div class="section">
<h3>📊 Scenario Selection</h3>
<select id="scenario">
<option value="0.8">🟥 Conservative (Low prices, high risk)</option>
<option value="1.0" selected>🟨 Base Case (Normal market)</option>
<option value="1.2">🟩 Aggressive (Eid + high demand)</option>
</select>
</div>

<div class="section">
<h3>🏗 Fixed Assets</h3>

<label>Land Cost</label>
<input id="land" value="1200000"><br>

<label>Development Cost</label>
<input id="dev" value="2000000"><br>

<label>Breeding Goat Cost</label>
<input id="breedCost" value="1000000"><br>
</div>

<div class="section">
<h3>⚙ Operating Inputs</h3>

<label>Monthly Feed Cost</label>
<input id="feed" value="60000"><br>

<label>Employee</label>
<input id="emp" value="25000"><br>

<label>Petrol</label>
<input id="petrol" value="60000"><br>

<label>Mortality Rate %</label>
<input id="mortality" value="10"><br>

<label>Inflation % (annual)</label>
<input id="inflation" value="12"><br>
</div>

<div class="section">
<h3>📦 Trading Engine</h3>

<label>Goats / Month</label>
<input id="tradeCount" value="20"><br>

<label>Buy Price</label>
<input id="buy" value="40000"><br>

<label>Sell Price</label>
<input id="sell" value="50000"><br>
</div>

<div class="section">
<h3>🐐 Breeding Engine</h3>

<label>Female Goats</label>
<input id="female" value="25"><br>

<label>Kids per Female / Year</label>
<input id="kids" value="2"><br>

<label>Kid Price</label>
<input id="kidPrice" value="30000"><br>
</div>

<br>
<button onclick="run()">Run VC Model</button>

<div class="card" id="output"></div>

<canvas id="chart"></canvas>

</div>

<script>

let chart;

function n(id){ return Number(document.getElementById(id).value); }

function run(){

let scenario = Number(document.getElementById("scenario").value);

// =======================
// CAPITAL
// =======================
let fixed =
n("land") + n("dev") + n("breedCost");

// =======================
// COSTS
// =======================
let monthlyCost =
n("feed") + n("emp") + n("petrol");

// =======================
// TRADING (scenario adjusted)
// =======================
let tradeProfit =
n("tradeCount") *
((n("sell") - n("buy")) * scenario);

// =======================
// BREEDING WITH RISK
// =======================
let survival = 1 - (n("mortality")/100);

let yearlyKids =
n("female") * n("kids") * survival;

let breedingRevenue =
yearlyKids * n("kidPrice") * scenario;

let breedingMonthly =
breedingRevenue / 12;

// =======================
// CASHFLOW
// =======================
let monthlyProfit =
tradeProfit + breedingMonthly - monthlyCost;

let yearlyProfit = monthlyProfit * 12;

// =======================
// VC METRICS
// =======================

// ROI
let roi = (yearlyProfit / fixed) * 100;

// Payback
let payback = fixed / yearlyProfit;

// Cashflow stability (simplified score)
let stability =
((breedingMonthly / monthlyProfit) * 100).toFixed(0);

// =======================
// 5 YEAR PROJECTION (NAV + RISK)
// =======================
let labels=[];
let nav=[];
let riskAdjProfit=[];

let value = fixed;

for(let i=1;i<=5;i++){

value += yearlyProfit;

// risk erosion over time
let riskFactor = 1 - (n("inflation")/100)*i;

labels.push("Year " + i);
nav.push(value);
riskAdjProfit.push(yearlyProfit * riskFactor);
}

// =======================
// OUTPUT
// =======================
document.getElementById("output").innerHTML = `

<h3>📊 VC Summary Dashboard</h3>

<b>🏗 Fixed Capital:</b> ${fixed.toLocaleString()} PKR<br>

<hr>

<h3>💰 Financial Performance</h3>

Monthly Profit: <b>${Math.round(monthlyProfit).toLocaleString()}</b> PKR<br>
Yearly Profit: <b>${Math.round(yearlyProfit).toLocaleString()}</b> PKR<br>
ROI: <b>${roi.toFixed(2)}%</b><br>
Payback: <b>${payback.toFixed(2)} years</b><br>

<hr>

<h3>🐐 Business Quality Metrics</h3>

Breeding Contribution: <b>${stability}% of cashflow</b><br>
Annual Kids Sold: <b>${Math.round(yearlyKids)}</b><br>

<hr>

<h3>⚠️ VC Interpretation</h3>

${roi > 25 ? "🟢 Strong Investment Case" : roi > 15 ? "🟡 Moderate Case" : "🔴 Weak Case"}<br>

${payback < 4 ? "🟢 Fast payback" : "🟡 Slow payback"}<br>

`;

// =======================
// CHART
// =======================
if(chart) chart.destroy();

chart = new Chart(document.getElementById("chart"),{
type:'line',
data:{
labels:labels,
datasets:[
{
label:"Farm NAV (Asset Value)",
data:nav
},
{
label:"Risk Adjusted Profit",
data:riskAdjProfit
}
]
}
});

}

run();

</script>

</body>
</html>
